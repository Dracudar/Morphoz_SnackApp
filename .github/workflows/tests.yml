name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    name: Tests unitaires et UI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Dépendances système pour Qt (mode headless)
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft*.list /etc/apt/sources.list.d/azure*.list
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 \
            libdbus-1-3 \
            libgl1 \
            libegl1 \
            libfontconfig1 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libcairo2-dev

      - name: Installation des dépendances Python
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lancement des tests
        env:
          QT_QPA_PLATFORM: offscreen
          QT_DEBUG_PLUGINS: 0
        run: |
          pytest --tb=short -v --cov=src --cov-report=term-missing --cov-report=xml
