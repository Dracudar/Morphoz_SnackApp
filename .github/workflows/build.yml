name: Build

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dépendances
        run: pip install -r requirements.txt pyinstaller

      - name: Compiler l'app principale
        run: pyinstaller morphoz_snackapp.spec --clean --noconfirm

      - name: Compiler l'app préparation
        run: pyinstaller morphoz_prep.spec --clean --noconfirm

      - name: Archiver les builds Windows
        shell: pwsh
        run: |
          Compress-Archive -Path dist/MorphozSnackApp -DestinationPath MorphozSnackApp-windows.zip
          Compress-Archive -Path dist/MorphozSnackApp_prep -DestinationPath MorphozSnackApp_prep-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: build-windows-main
          path: MorphozSnackApp-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: build-windows-prep
          path: MorphozSnackApp_prep-windows.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dépendances système
        run: sudo apt-get install -y libusb-1.0-0-dev libgl1

      - name: Installer les dépendances Python
        run: pip install -r requirements.txt pyinstaller

      - name: Compiler l'app principale
        run: pyinstaller morphoz_snackapp.spec --clean --noconfirm

      - name: Compiler l'app préparation
        run: pyinstaller morphoz_prep.spec --clean --noconfirm

      - name: Archiver les builds Linux
        run: |
          tar -czf MorphozSnackApp-linux.tar.gz -C dist MorphozSnackApp
          tar -czf MorphozSnackApp_prep-linux.tar.gz -C dist MorphozSnackApp_prep

      - uses: actions/upload-artifact@v4
        with:
          name: build-linux-main
          path: MorphozSnackApp-linux.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: build-linux-prep
          path: MorphozSnackApp_prep-linux.tar.gz

  release:
    name: Créer la release GitHub
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-windows-main

      - uses: actions/download-artifact@v4
        with:
          name: build-windows-prep

      - uses: actions/download-artifact@v4
        with:
          name: build-linux-main

      - uses: actions/download-artifact@v4
        with:
          name: build-linux-prep

      - name: Publier la release avec les quatre exécutables
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            MorphozSnackApp-windows.zip \
            MorphozSnackApp-linux.tar.gz \
            MorphozSnackApp_prep-windows.zip \
            MorphozSnackApp_prep-linux.tar.gz \
            --repo "${{ github.repository }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
