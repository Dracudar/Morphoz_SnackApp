name: Build

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dépendances
        run: pip install -r requirements.txt pyinstaller

      - name: Compiler avec PyInstaller
        run: pyinstaller morphoz_snackapp.spec --clean --noconfirm

      - name: Archiver le build Windows
        shell: pwsh
        run: Compress-Archive -Path dist/MorphozSnackApp -DestinationPath MorphozSnackApp-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: MorphozSnackApp-windows.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dépendances système
        run: sudo apt-get install -y libusb-1.0-0-dev libgl1

      - name: Installer les dépendances Python
        run: pip install -r requirements.txt pyinstaller

      - name: Compiler avec PyInstaller
        run: pyinstaller morphoz_snackapp.spec --clean --noconfirm

      - name: Archiver le build Linux
        run: tar -czf MorphozSnackApp-linux.tar.gz -C dist MorphozSnackApp

      - uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: MorphozSnackApp-linux.tar.gz

  release:
    name: Créer la release GitHub
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-windows

      - uses: actions/download-artifact@v4
        with:
          name: build-linux

      - name: Publier la release avec les deux exécutables
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            MorphozSnackApp-windows.zip \
            MorphozSnackApp-linux.tar.gz \
            --repo "${{ github.repository }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
