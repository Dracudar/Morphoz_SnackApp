name: Auto-tag

on:
  push:
    branches:
      - main

jobs:
  tag:
    name: Créer le tag de version si absent
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      exists: ${{ steps.check.outputs.exists }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Lire APP_VERSION depuis version.py
        id: version
        run: |
          VERSION=$(python3 -c "exec(open('src/core/version.py').read()); print(APP_VERSION)")
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Vérifier si le tag existe déjà
        id: check
        run: |
          if git tag --list | grep -qx "${{ steps.version.outputs.tag }}"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Créer et pousser le tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

  build:
    name: Compiler et publier la release
    needs: tag
    if: needs.tag.outputs.exists == 'false'
    permissions:
      contents: write
    uses: ./.github/workflows/build.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
